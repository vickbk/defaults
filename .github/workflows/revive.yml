name: Go Code Quality Check

on:
    push:
        branches: ["main"] # Triggers on push to main branch
    pull_request:
        branches: ["main"] # Triggers on pull requests to main

jobs:
    quality-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4 # Clones your repository

            - name: Set up Go
              uses: actions/setup-go@v5 # Installs the Go toolchain
              with:
                  go-version: "1.25" # Specify your Go version or use a file

            - name: Install dependencies
              run: go mod download # Downloads modules defined in go.mod

            - name: Run Code Quality Check
              run: go vet ./... # Runs the Go vet tool to check for potential issues

            - name: Install Revive
              run: go install github.com/mgechev/revive@latest # Installs the Revive linter

            - name: Run revive
              run: revive -config revive.toml -formatter stylish -set_exit_status ./...
